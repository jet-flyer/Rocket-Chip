# =============================================================================
# RocketChip Mission Profile — High Altitude Balloon (HAB)
# =============================================================================
#
# This file configures the Flight Director for a high altitude balloon
# with cutdown recovery. No pyrotechnic channels — uses servo or
# nichrome cutdown instead.
#
# KEY DIFFERENCES FROM ROCKET:
#   - No pyro channels (HAS_PYRO = 0)
#   - Emergency deploy skips lockouts (no high-speed flight phase)
#   - Lower launch accel (gentle balloon release)
#   - Longer coast timeout (balloon ascent is slow)
#   - Lower deploy lockout speed
#
# HOW TO USE:
#   1. Edit the values below with any text editor
#   2. Run:  python scripts/generate_profile.py profiles/hab.cfg
#   3. Rebuild firmware to apply
#
# ALL VALUES ARE SI UNITS unless noted otherwise:
#   Distance:     meters (m)
#   Speed:        meters per second (m/s)
#   Acceleration: meters per second squared (m/s^2)
#   Time:         milliseconds (ms)
#
# =============================================================================

PROFILE_NAME        HAB

# =============================================================================
# TIMEOUTS
# =============================================================================

ARMED_TIMEOUT_MS    600000          # 10 minutes (longer prep time for balloon)
ABORT_TIMEOUT_MS    300000          # 5 minutes
COAST_TIMEOUT_MS    60000           # 60 seconds (balloon ascent is slow)

# =============================================================================
# LAUNCH DETECTION
# =============================================================================
# Balloon release is gentler than rocket launch — lower threshold.

LAUNCH_ACCEL        5.0             # m/s^2 (~0.5g) VALIDATE
LAUNCH_HOLD_MS      100             # 100 ms (longer hold, less vibration)

# =============================================================================
# BURNOUT DETECTION
# =============================================================================
# HAB has no motor, but the phase exists for cutdown detection.
# Use low accel to detect end of initial release dynamics.

BURNOUT_ACCEL       3.0             # m/s^2 VALIDATE
BURNOUT_HOLD_MS     200             # 200 ms
BURNOUT_BACKUP_MS   30000           # 30 seconds

# =============================================================================
# APOGEE DETECTION
# =============================================================================
# Balloon apogee: burst or cutdown. Velocity reversal is the signal.

APOGEE_VEL          1.0             # m/s (balloon ascent is ~5 m/s) VALIDATE
APOGEE_HOLD_MS      100             # 100 ms
BARO_HOLD_MS        500             # 500 ms (baro noisier at altitude)
APOGEE_BOTH         0               # OR — either sensor triggers (burst is sudden)

# =============================================================================
# MAIN PARACHUTE DEPLOYMENT
# =============================================================================
# HAB descends on parachute from burst altitude. "Main" is the only chute.

MAIN_ALT_M          500.0           # meters AGL VALIDATE
MAIN_HOLD_MS        100             # 100 ms
MAIN_BACKUP_MS      300000          # 5 minutes (long descent from altitude)

# =============================================================================
# LANDING DETECTION
# =============================================================================

LAND_VEL            0.5             # m/s VALIDATE
LAND_HOLD_MS        3000            # 3 seconds (trees/wind can cause oscillation)

# =============================================================================
# SAFETY LOCKOUTS
# =============================================================================

DEPLOY_LOCKOUT_MPS  20.0            # m/s (HAB never goes fast)
APOGEE_LOCKOUT_MS   5000            # 5 seconds
EMERG_DEPLOY        1               # Skip lockouts — no high-speed phase

# =============================================================================
# PYROTECHNIC CHANNELS
# =============================================================================

HAS_PYRO            0               # No pyro — servo/nichrome cutdown
ABORT_DROGUE_BOOST  0               # No pyro to fire
ABORT_DROGUE_COAST  0               # No pyro to fire

# =============================================================================
# PRE-ARM REQUIREMENTS
# =============================================================================

REQUIRE_GPS         1               # GPS required for HAB recovery
REQUIRE_MAG         0
REQUIRE_RADIO       1               # Radio required for HAB telemetry

# =============================================================================
# PHASE Q/R — ESKF Adaptive Estimation (IVP-83)
# =============================================================================
# HAB: no motor, slow ascent, no transonic phase.
# BOOST column is reused for slow ascent (low Q scales).
# ALL VALUES ARE VALIDATE — tune with flight data (Stage 13).
#
# Column order: IDLE ARMED BOOST COAST DROGUE_DESC MAIN_DESC LANDED ABORT

Q_ATT_SCALE     1.0 1.0 2.0 2.0 2.0 2.0 1.0 2.0
Q_VEL_SCALE     1.0 1.0 5.0 5.0 5.0 5.0 1.0 5.0
Q_ABIAS_SCALE   1.0 1.0 2.0 2.0 1.0 1.0 1.0 2.0
Q_GBIAS_SCALE   1.0 1.0 2.0 2.0 1.0 1.0 1.0 2.0

R_BARO          0.001 0.001 0.001 0.001 0.001 0.001 0.001 0.001
R_MAG           0.008 0.008 0.008 0.008 0.008 0.008 0.008 0.008
R_GPS_POS       12.25 12.25 12.25 12.25 12.25 12.25 12.25 12.25
R_GPS_VEL       0.25 0.25 0.25 0.25 0.25 0.25 0.25 0.25

QR_RAMP_STEPS   20

# =============================================================================
# RADIO CONFIGURATION (IVP-96)
# =============================================================================

RADIO_MODE          0               # TX (vehicle)
RADIO_PROTOCOL      0               # CCSDS
RADIO_RATE_HZ       2               # 2 Hz (long range, low duty cycle)
RADIO_POWER_DBM     20              # +20 dBm

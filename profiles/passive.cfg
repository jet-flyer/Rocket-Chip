# =============================================================================
# RocketChip Mission Profile — Passive (Data Logging Only)
# =============================================================================
#
# For rockets with motor-eject recovery (Estes, Aerotech SU motors).
# The Flight Director tracks state and logs events but NEVER fires pyro
# channels. All deployment is handled by the motor's built-in ejection
# charge.
#
# Use this profile when:
#   - Your motor has a built-in ejection charge (most Estes, many Aerotech)
#   - You don't have pyro channels wired
#   - You want pure data logging (altitude, speed, acceleration)
#   - You're testing the board in a rocket for the first time
#
# The state machine still transitions through all flight phases based on
# sensor data, so your flight log has correct phase markers and timing.
#
# HOW TO USE:
#   1. Run:  python scripts/generate_profile.py profiles/passive.cfg
#   2. Rebuild firmware to apply
#
# Share this file: community.rocketchip.io
# =============================================================================

PROFILE_NAME        Passive

# =============================================================================
# TIMEOUTS
# =============================================================================

ARMED_TIMEOUT_MS    300000          # 5 minutes
ABORT_TIMEOUT_MS    300000          # 5 minutes
COAST_TIMEOUT_MS    15000           # 15 seconds

# =============================================================================
# LAUNCH DETECTION
# =============================================================================

LAUNCH_ACCEL        20.0            # m/s^2 (~2g)
LAUNCH_HOLD_MS      50              # 50 ms

# =============================================================================
# BURNOUT DETECTION
# =============================================================================

BURNOUT_ACCEL       5.0             # m/s^2
BURNOUT_HOLD_MS     100             # 100 ms
BURNOUT_BACKUP_MS   10000           # 10 seconds

# =============================================================================
# APOGEE DETECTION
# =============================================================================

APOGEE_VEL          0.5             # m/s
APOGEE_HOLD_MS      30              # 30 ms
BARO_HOLD_MS        200             # 200 ms
APOGEE_BOTH         1               # AND gate

# =============================================================================
# MAIN PARACHUTE (phase transition only — no pyro)
# =============================================================================

MAIN_ALT_M          150.0           # meters AGL
MAIN_HOLD_MS        50              # 50 ms
MAIN_BACKUP_MS      120000          # 120 seconds

# =============================================================================
# LANDING DETECTION
# =============================================================================

LAND_VEL            0.5             # m/s
LAND_HOLD_MS        2000            # 2 seconds

# =============================================================================
# SAFETY LOCKOUTS
# =============================================================================

DEPLOY_LOCKOUT_MPS  80.0            # m/s
APOGEE_LOCKOUT_MS   3000            # 3 seconds
EMERG_DEPLOY        0

# =============================================================================
# PYROTECHNIC CHANNELS — ALL DISABLED
# =============================================================================

HAS_PYRO            0               # No pyro firing — motor-eject only
ABORT_DROGUE_BOOST  0
ABORT_DROGUE_COAST  0

# =============================================================================
# PRE-ARM REQUIREMENTS
# =============================================================================

REQUIRE_GPS         0
REQUIRE_MAG         0
REQUIRE_RADIO       0

# =============================================================================
# PHASE Q/R — same as Rocket (sensor physics don't change)
# =============================================================================

Q_ATT_SCALE     1.0 1.0 10.0 5.0 2.0 2.0 1.0 5.0
Q_VEL_SCALE     1.0 1.0 50.0 10.0 5.0 5.0 1.0 10.0
Q_ABIAS_SCALE   1.0 1.0 5.0 2.0 1.0 1.0 1.0 2.0
Q_GBIAS_SCALE   1.0 1.0 5.0 2.0 1.0 1.0 1.0 2.0

R_BARO          0.001 0.001 0.004 0.001 0.001 0.001 0.001 0.001
R_MAG           0.008 0.008 0.016 0.008 0.008 0.008 0.008 0.008
R_GPS_POS       12.25 12.25 12.25 12.25 12.25 12.25 12.25 12.25
R_GPS_VEL       0.25 0.25 0.25 0.25 0.25 0.25 0.25 0.25

QR_RAMP_STEPS   20

# =============================================================================
# DEFAULT LOCATION (Core tier, no GPS)
# =============================================================================

DEFAULT_LAT         33.0            # degrees North
DEFAULT_LON         -97.0           # degrees East (negative = West)

# =============================================================================
# PIO BACKUP DEPLOYMENT TIMERS — DISABLED
# =============================================================================

DROGUE_TIMER_S      0               # Disabled (no pyro)
DROGUE_TIMER_ACTION 0               # No action
MAIN_TIMER_S        0               # Disabled (no pyro)
MAIN_TIMER_ACTION   0               # No action

# =============================================================================
# SAFE MODE
# =============================================================================

SAFE_MODE_ACTION    0

# =============================================================================
# RADIO CONFIGURATION
# =============================================================================

RADIO_MODE          0               # TX (vehicle)
RADIO_PROTOCOL      0               # CCSDS
RADIO_RATE_HZ       5               # 5 Hz
RADIO_POWER_DBM     20              # +20 dBm

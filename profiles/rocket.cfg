# =============================================================================
# RocketChip Mission Profile — Rocket (Default)
# =============================================================================
#
# This file configures the Flight Director for a standard model rocket with
# dual-deploy recovery (drogue at apogee, main at altitude).
#
# HOW TO USE:
#   1. Edit the values below with any text editor
#   2. Run:  python scripts/generate_profile.py profiles/rocket.cfg
#   3. Rebuild firmware to apply
#
# ALL VALUES ARE SI UNITS unless noted otherwise:
#   Distance:     meters (m)
#   Speed:        meters per second (m/s)
#   Acceleration: meters per second squared (m/s^2)
#   Time:         milliseconds (ms)
#
# Values marked VALIDATE are engineering estimates that have not been
# verified with flight data. Test on the ground before relying on them.
#
# Share this file: community.rocketchip.io
# =============================================================================

PROFILE_NAME        Rocket

# =============================================================================
# TIMEOUTS
# =============================================================================

# Auto-disarm if no launch detected (prevents forgotten armed state)
ARMED_TIMEOUT_MS    300000          # 5 minutes

# Auto-transition from ABORT to LANDED (prevents stuck abort)
ABORT_TIMEOUT_MS    300000          # 5 minutes

# If apogee is not detected, force it after this long in coast phase
COAST_TIMEOUT_MS    15000           # 15 seconds

# =============================================================================
# LAUNCH DETECTION
# =============================================================================
# The rocket must accelerate along its body axis above this threshold
# for the hold time before launch is confirmed.

LAUNCH_ACCEL        20.0            # m/s^2 (~2g) VALIDATE
LAUNCH_HOLD_MS      50              # 50 ms (5 samples at 100 Hz)

# =============================================================================
# BURNOUT DETECTION
# =============================================================================
# When total acceleration drops below this threshold, the motor has
# burned out and we transition from BOOST to COAST.

BURNOUT_ACCEL       5.0             # m/s^2 VALIDATE
BURNOUT_HOLD_MS     100             # 100 ms (10 samples)

# Max time in BOOST before forcing coast (backup if burnout not detected)
BURNOUT_BACKUP_MS   10000           # 10 seconds

# =============================================================================
# APOGEE DETECTION
# =============================================================================
# Apogee is detected when vertical velocity drops below this threshold.
# A barometric backup confirms using altitude derivative.

APOGEE_VEL          0.5             # m/s VALIDATE
APOGEE_HOLD_MS      30              # 30 ms (3 samples)

# Barometric backup: altitude derivative must agree for this long
BARO_HOLD_MS        200             # 200 ms (20 samples)

# Require BOTH velocity AND barometer to agree? (safer but slower)
#   1 = AND (both must confirm)
#   0 = OR  (either one triggers)
APOGEE_BOTH         1

# =============================================================================
# MAIN PARACHUTE DEPLOYMENT
# =============================================================================
# Main chute deploys when altitude above ground drops below this value.
# Only evaluated during drogue descent (after apogee).

MAIN_ALT_M          150.0           # meters AGL VALIDATE
MAIN_HOLD_MS        50              # 50 ms (5 samples)

# Max time in drogue descent before forcing main deploy
MAIN_BACKUP_MS      120000          # 120 seconds (2 minutes)

# =============================================================================
# LANDING DETECTION
# =============================================================================
# Landing is confirmed when velocity stays below this threshold
# for the hold time (prevents false landing on parachute oscillation).

LAND_VEL            0.5             # m/s VALIDATE
LAND_HOLD_MS        2000            # 2 seconds (200 samples)

# =============================================================================
# SAFETY LOCKOUTS
# =============================================================================
# These prevent dangerous deployments during high-speed flight.

# Do not deploy chutes if vehicle is going faster than this
DEPLOY_LOCKOUT_MPS  80.0            # m/s (~Mach 0.24) VALIDATE

# Do not detect apogee until at least this long after launch
APOGEE_LOCKOUT_MS   3000            # 3 seconds

# Skip lockouts for emergency deploy? (for HAB only — no high-speed phase)
#   0 = respect lockouts (rockets)
#   1 = skip lockouts (HAB/balloon)
EMERG_DEPLOY        0

# =============================================================================
# PYROTECHNIC CHANNELS
# =============================================================================

# Does this vehicle have pyro deployment charges?
HAS_PYRO            1

# Fire drogue chute if ABORT is triggered during boost?
# (Better to deploy chute under thrust than go ballistic)
ABORT_DROGUE_BOOST  1

# Fire drogue chute if ABORT is triggered during coast?
ABORT_DROGUE_COAST  1

# =============================================================================
# PRE-ARM REQUIREMENTS
# =============================================================================
# Which sensors must be ready before arming?
#   1 = required (ARM fails without it)
#   0 = optional (ARM warns but proceeds)

REQUIRE_GPS         0
REQUIRE_MAG         0
REQUIRE_RADIO       0
